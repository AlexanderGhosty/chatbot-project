x-app-env: &app-env
  PYTHONUNBUFFERED: "1"
  TOKENIZERS_PARALLELISM: "false"
  HF_HOME: /cache/huggingface
  TORCH_HOME: /cache/torch
  XDG_CACHE_HOME: /cache/xdg

x-app-volumes: &app-volumes
  - ./data:/app/data
  - ./media:/app/media
  - hf-cache:/cache/huggingface
  - xdg-cache:/cache/xdg

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  network: host

x-app-base: &app-base
  build: *app-build
  image: furniture-chatbot:${APP_IMAGE_TAG:-1.0.0}
  network_mode: host
  env_file:
    - .env
  environment:
    <<: *app-env
  volumes: *app-volumes

services:
  bot:
    <<: *app-base
    command: ["python", "main.py"]
    restart: unless-stopped
    stop_grace_period: 30s

  indexer:
    <<: *app-base
    profiles: ["tools"]
    command: ["python", "scripts/build_vector_db.py"]
    restart: "no"

  chitchat-importer:
    <<: *app-base
    profiles: ["tools"]
    command: ["python", "scripts/import_siberian_persona_chat.py"]
    restart: "no"

  chitchat-indexer:
    <<: *app-base
    profiles: ["tools"]
    command:
      [
        "python",
        "scripts/build_vector_db.py",
        "--dialogues",
        "data/raw/chitchat_dialogues.txt",
        "--collection",
        "chitchat_dialogues",
        "--no-seed-dialogues",
        "--filter-unsafe-pairs",
      ]
    restart: "no"

volumes:
  hf-cache:
  xdg-cache:
